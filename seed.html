const logEl = document.getElementById('log');
logEl.textContent = 'Firebase loaded. Ready to seed.';
function log(msg) {
  logEl.textContent += "\n" + msg;
  logEl.scrollTop = logEl.scrollHeight;
}

function runSeed() {
  document.getElementById('seedBtn').disabled = true;
  log('Starting seed...');

  seedUsers()
    .then(seedTournaments)
    .then(seedGames)
    .then(() => {
      log('');
      log('SEED COMPLETE. You can now open the main app (index.html).');
    })
    .catch(err => {
      log('ERROR: ' + err.message);
      console.error(err);
    });
}

function seedUsers() {
  log('Writing ' + seedData.users.length + ' users...');
  const batch = db.batch();
  seedData.users.forEach(u => {
    batch.set(db.collection('users').doc(u.username), u, { merge: true });
  });
  return batch.commit().then(() => log('Users done.'));
}

function seedTournaments() {
  log('Writing ' + seedData.tournaments.length + ' tournaments...');
  const batch = db.batch();
  seedData.tournaments.forEach(t => {
    batch.set(db.collection('tournaments').doc(t.code), t, { merge: true });
  });
  return batch.commit().then(() => log('Tournaments done.'));
}

function seedGames() {
  log('Writing ' + seedData.games.length + ' games (batched)...');
  const games = seedData.games;
  const chunkSize = 450;
  let chain = Promise.resolve();
  for (let i = 0; i < games.length; i += chunkSize) {
    const chunk = games.slice(i, i + chunkSize);
    const end = Math.min(i + chunkSize, games.length);
    chain = chain.then(() => {
      const batch = db.batch();
      chunk.forEach(g => {
        batch.set(db.collection('games').doc(g.gameId), g, { merge: true });
      });
      return batch.commit().then(() => log('  ' + end + ' / ' + games.length));
    });
  }
  return chain.then(() => log('Games done.'));
}
